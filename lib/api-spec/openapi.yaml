openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: RinoDesk AgentOS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tickets
    description: Support ticket operations
  - name: agents
    description: AI agent operations
  - name: insights
    description: Business insights operations
  - name: gemini
    description: Gemini AI chat and image operations
  - name: settings
    description: Notification settings operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tickets:
    get:
      operationId: listTickets
      tags: [tickets]
      summary: List all tickets
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create a new ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get ticket by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateTicket
      tags: [tickets]
      summary: Update a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}/process:
    post:
      operationId: processTicket
      tags: [tickets]
      summary: Run all AI agents on a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of agent processing events
          content:
            text/event-stream: {}

  /tickets/stats:
    get:
      operationId: getTicketStats
      tags: [tickets]
      summary: Get ticket stats summary
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketStats"

  /agents/runs:
    get:
      operationId: listAgentRuns
      tags: [agents]
      summary: List recent agent runs
      parameters:
        - name: ticketId
          in: query
          schema:
            type: integer
        - name: agentName
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of agent runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentRun"

  /insights:
    get:
      operationId: listInsights
      tags: [insights]
      summary: List business insights
      responses:
        "200":
          description: List of insights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Insight"
    post:
      operationId: generateInsights
      tags: [insights]
      summary: Trigger AI insight generation
      responses:
        "200":
          description: SSE stream of insight events
          content:
            text/event-stream: {}

  /insights/summary:
    get:
      operationId: getInsightsSummary
      tags: [insights]
      summary: Get aggregated dashboard summary
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightsSummary"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get notification settings
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update notification settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"

  /settings/test-alert:
    post:
      operationId: sendTestAlert
      tags: [settings]
      summary: Send a test Slack alert
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestAlertResult"

  /gemini/conversations:
    get:
      operationId: listGeminiConversations
      tags: [gemini]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiConversation"
    post:
      operationId: createGeminiConversation
      tags: [gemini]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversation"

  /gemini/conversations/{id}:
    get:
      operationId: getGeminiConversation
      tags: [gemini]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiError"
    delete:
      operationId: deleteGeminiConversation
      tags: [gemini]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiError"

  /gemini/conversations/{id}/messages:
    get:
      operationId: listGeminiMessages
      tags: [gemini]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeminiMessage"
    post:
      operationId: sendGeminiMessage
      tags: [gemini]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Ticket:
      type: object
      properties:
        id:
          type: integer
        subject:
          type: string
        body:
          type: string
        customerName:
          type: string
        customerEmail:
          type: string
        status:
          type: string
        priority:
          type: string
        category:
          type: ["string", "null"]
        agentSummary:
          type: ["string", "null"]
        draftResponse:
          type: ["string", "null"]
        escalationRisk:
          type: ["string", "null"]
        escalationReason:
          type: ["string", "null"]
        policyNotes:
          type: ["string", "null"]
        processedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - subject
        - body
        - customerName
        - customerEmail
        - status
        - priority
        - createdAt
        - updatedAt

    TicketInput:
      type: object
      properties:
        subject:
          type: string
        body:
          type: string
        customerName:
          type: string
        customerEmail:
          type: string
        priority:
          type: string
      required:
        - subject
        - body
        - customerName
        - customerEmail

    TicketUpdate:
      type: object
      properties:
        status:
          type: string
        priority:
          type: string
        draftResponse:
          type: string

    TicketStats:
      type: object
      properties:
        total:
          type: integer
        open:
          type: integer
        inProgress:
          type: integer
        resolved:
          type: integer
        escalated:
          type: integer
        avgResolutionHours:
          type: number
        highPriority:
          type: integer
      required:
        - total
        - open
        - inProgress
        - resolved
        - escalated
        - avgResolutionHours
        - highPriority

    AgentRun:
      type: object
      properties:
        id:
          type: integer
        ticketId:
          type: integer
        agentName:
          type: string
        status:
          type: string
        output:
          type: ["string", "null"]
        durationMs:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - ticketId
        - agentName
        - status
        - createdAt

    Insight:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        category:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - content
        - category
        - createdAt

    InsightInput:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        category:
          type: string
      required:
        - title
        - content
        - category

    InsightsSummary:
      type: object
      properties:
        totalTicketsToday:
          type: integer
        escalationsToday:
          type: integer
        avgResponseTimeMins:
          type: number
        topCategories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        agentPerformance:
          type: array
          items:
            $ref: "#/components/schemas/AgentPerf"
        recentInsights:
          type: array
          items:
            $ref: "#/components/schemas/Insight"
      required:
        - totalTicketsToday
        - escalationsToday
        - avgResponseTimeMins
        - topCategories
        - agentPerformance
        - recentInsights

    CategoryCount:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
      required:
        - category
        - count

    AgentPerf:
      type: object
      properties:
        agentName:
          type: string
        totalRuns:
          type: integer
        successRate:
          type: number
        avgDurationMs:
          type: number
      required:
        - agentName
        - totalRuns
        - successRate
        - avgDurationMs

    GeminiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    GeminiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    GeminiConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    GeminiMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    GeminiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/GeminiMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    GeminiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    NotificationSettings:
      type: object
      properties:
        id:
          type: integer
        slackWebhookUrl:
          type: ["string", "null"]
        alertsEnabled:
          type: boolean
        alertOnHigh:
          type: boolean
        alertOnMedium:
          type: boolean
        notifyEmail:
          type: ["string", "null"]
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - alertsEnabled
        - alertOnHigh
        - alertOnMedium
        - updatedAt

    NotificationSettingsUpdate:
      type: object
      properties:
        slackWebhookUrl:
          type: string
        alertsEnabled:
          type: boolean
        alertOnHigh:
          type: boolean
        alertOnMedium:
          type: boolean
        notifyEmail:
          type: string

    TestAlertResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message
